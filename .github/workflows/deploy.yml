name: Deploy frontend to Yandex Object Storage

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      env:
        description: 'Manual run'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://navff-linni-back-f310.twc1.net

      - name: Upload to Yandex Object Storage
        uses: yc-actions/yc-obj-storage-upload@v2
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
          bucket: max.linni.org
          root: ./dist
          include: '**'
          cache-control: |
            index.html: no-cache, no-store, must-revalidate
            assets/*: public, max-age=31536000, immutable
